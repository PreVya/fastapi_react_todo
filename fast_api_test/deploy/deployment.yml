apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-api-test
spec:
  selector:
    matchLabels:
      app: fast-api-test
  template:
    metadata:
      labels:
        app: fast-api-test
    spec:
      containers:
        - name: fast-api-test
          image: <Image>
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8000
